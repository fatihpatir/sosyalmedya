<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nene Hatun MTAL - Sosyal Medya Flashcards</title>
    <style>
        :root { --bg: #0f172a; --card-bg: #ffffff; --primary: #6366f1; --secondary: #a855f7; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        header { text-align: center; padding: 15px; background: rgba(255, 255, 255, 0.05); width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .back-btn { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; transition: 0.3; }
        .back-btn:hover { background: white; color: var(--bg); }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 20px 0; gap: 20px; }
        .progress-container { width: 80%; max-width: 500px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .progress-bar { height: 100%; background: linear-gradient(to right, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; border-radius: 10px; }
        .stage { perspective: 1500px; width: 90%; max-width: 450px; height: 300px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 25px; box-sizing: border-box; border-radius: 25px; font-size: 1.1rem; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); overflow-y: auto; }
        .card-front { background: var(--card-bg); color: #1e293b; font-weight: 600; }
        .card-back { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; transform: rotateY(180deg); }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        button { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: white; color: black; }
        .btn-speak-on { background: #22c55e !important; }
        .btn-speak-off { background: #ef4444 !important; }
        footer { padding: 15px; width: 100%; text-align: center; background: rgba(0,0,0,0.3); font-size: 0.9rem; margin-top: auto; }
        footer a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body class="theme-dark">
    <header>
        <a href="index.html" class="back-btn">⬅ Geri</a>
        <div style="font-size: 0.75rem; opacity: 0.8;">KORKUTELİ NENE HATUN MTAL</div>
        <div style="font-size: 1.2rem; font-weight: bold;">Sosyal Medya Flashcards</div>
    </header>

    <div class="main-content">
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="stage">
            <div class="card" id="card">
                <div class="card-face card-front" id="qText">Yükleniyor...</div>
                <div class="card-face card-back" id="aText">Yükleniyor...</div>
            </div>
        </div>
        <div class="controls">
            <div style="display:flex; gap:15px; align-items:center;">
                <button onclick="prevCard()">Geri</button>
                <span id="counter" style="font-family: monospace;">1 / 81</span>
                <button onclick="nextCard()">İleri</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="shuffleCards()">🔀 Karıştır</button>
                <button id="speakBtn" onclick="toggleSpeech()" class="btn-speak-off">🔇 Ses: Kapalı</button>
            </div>
        </div>
    </div>

    <footer>Hazırlayan: <a href="https://fatihpatir.github.io/web" target="_blank">Fatih PATIR</a></footer>

    <script>
        const dataOrig = [
            ["E-ticaret kavramının en temel tanımı nedir?", "Mal ve hizmetlerin internet üzerinden alım satımı yapılmasıdır."],
            ["E-ticaretin fiziksel mağazacılığa göre en büyük avantajlarından biri nedir?", "Mekân sınırlaması olmaksızın 7/24 satış imkânı sunmasıdır."],
            ["E-ticaretin tüketiciler için dezavantajı sayılabilecek bir durum nedir?", "Ürüne fiziksel olarak dokunma veya deneme imkânının olmamasıdır."],
            ["E-ticaret iş planı hazırlamanın temel amacı nedir?", "İşin hedeflerini, stratejilerini ve operasyonel adımlarını belirlemektir."],
            ["Bir e-ticaret sitesinin teknik altyapısını oluşturan temel bileşenlerden biri nedir?", "Web barındırma (hosting) ve alan adı (domain) hizmetleridir."],
            ["E-ticarette 'Hazır Yazılım Paketleri' kullanmanın avantajı nedir?", "Hızlı kurulum ve teknik destek imkânı sağlamasıdır."],
            ["E-ticaret sitelerinde veri iletimini şifreleyerek güvenliği sağlayan protokol nedir?", "SSL (Secure Sockets Layer) sertifikası."],
            ["E-ticarette karşılaşılan yaygın güvenlik tehditlerinden biri nedir?", "Kullanıcı verilerinin çalınması veya oltalama (phishing) saldırılarıdır."],
            ["E-ticarette ödeme güvenliğini artırmak için kullanılan tek kullanımlık şifre sistemine ne ad verilir?", "3D Secure ödeme sistemi."],
            ["E-ticarette müşteri siparişini verdikten sonra gerçekleşen lojistik sürece ne ad verilir?", "Tedarik ve kargo yönetimi."],
            ["E-ticaretle ilgili hukuki düzenlemeler Türkiye'de hangi kanun kapsamında değerlendirilir?", "Elektronik Ticaretin Düzenlenmesi Hakkında Kanun."],
            ["E-ticarette ürün fotoğraflarının kalitesi hangi süreci doğrudan etkiler?", "Satın alma kararı ve dönüşüm oranlarını."],
            ["Veri analizi sonucunda elde edilen bulguların görselleştirilmesine ne ad verilir?", "Veri Görselleştirme."],
            ["Sosyal medya etiğine göre, bir başkasının fotoğrafını izinsiz paylaşmak hangi hakkı ihlal eder?", "Özel hayatın gizliliği ve mahremiyet hakkını."],
            ["E-ticaret sitelerinde 'Arama Motoru Optimizasyonu' (SEO) neden yapılır?", "Sitenin arama sonuçlarında üst sıralarda çıkarak organik trafik alması için."],
            ["Hiyerarşik bir yapıda 'Güneş Işığı' grafiği ile 'Ağaç Haritası' arasındaki temel görsel fark nedir?", "Güneş Işığı dairesel halkalar kullanırken, Ağaç Haritası dikdörtgen alanlar kullanır."],
            ["Bir şirketin sosyal medyadaki kriz anında sessiz kalması neden risklidir?", "Bilgi kirliliğinin artmasına ve marka itibarının daha fazla zarar görmesine yol açar."],
            ["Veri toplarken 'etik' açıdan yapılması gereken en önemli işlem nedir?", "Kullanıcılardan aydınlatılmış onam almak."],
            ["Radar grafiği diğer adıyla 'Örümcek Grafiği' hangi durumlarda etkisiz kalır?", "Çok fazla veri serisi veya değişken olduğunda grafik okunamaz hale gelir."],
            ["E-ticarette 'Dropshipping' satış modelinin temel özelliği nedir?", "Stok tutmadan, gelen siparişi doğrudan tedarikçiye yönlendirerek yapılan satıştır."],
            ["Hiyerarşik verilerin dikdörtgen alanlarla gösterildiği grafik türü hangisidir?", "Ağaç Haritası (Treemap)."],
            ["Bir e-ticaret sitesinde kriz yönetimi planı ne zaman hazırlanmalıdır?", "Kriz ortaya çıkmadan önce, proaktif bir yaklaşımla hazırlanmalıdır."],
            ["Sosyal medya platformlarında veri güvenliğini korumak için kullanıcılara önerilen en temel yöntem nedir?", "Güçlü ve benzersiz şifreler kullanmak ve iki aşamalı doğrulamayı aktif hale getirmek."],
            ["Görsel hiyerarşide en önemli bilginin en dikkat çekici şekilde sunulması kuralına ne ad verilir?", "Görsel vurgu veya odak noktası oluşturma."],
            ["Veri kümesindeki uç değerleri (aykırı veriler) göstermek için en uygun grafik türlerinden biri hangisidir?", "Kutu Grafiği (Box Plot)."],
            ["E-ticarette müşteri sadakatini artırmak için kullanılan dijital pazarlama yöntemi nedir?", "E-posta pazarlaması ve kişiselleştirilmiş indirim kuponları."],
            ["Hangi grafik türü bir bütünün parçalarını oranlayarak göstermek için tercih edilir?", "Pasta Grafiği veya Çörek Grafiği."],
            ["Verilerin zaman içindeki değişimini veya eğilimini göstermek için hangi grafik kullanılır?", "Çizgi Grafiği."],
            ["E-ticaret ekosisteminde 'B2C' modelinin açılımı nedir?", "Business to Consumer (İşletmeden Tüketiciye)."],
            ["Etik değerlere aykırı olarak kullanıcıların verilerini izinsiz takip eden yazılımlara ne ad verilir?", "Casus Yazılım (Spyware)."],
            ["Dijital dünyada kişisel verilerin korunmasıyla ilgili Türkiye'deki temel kanun hangisidir?", "Kişisel Verilerin Korunması Kanunu (KVKK)."],
            ["Bir veri setindeki değişkenler arasındaki ilişkiyi (korelasyonu) göstermek için hangi grafik kullanılır?", "Saçılım Grafiği (Scatter Plot)."],
            ["E-ticarette 'Sepet Terk Etme' oranı nedir?", "Müşterilerin ürünleri sepete ekleyip satın alma işlemini tamamlamadan siteden ayrılmasıdır."],
            ["Kullanıcı deneyimi (UX) tasarımı bir e-ticaret sitesinde neyi amaçlar?", "Sitenin kolay kullanılabilir olmasını ve müşteri memnuniyetini artırmayı."],
            ["Sosyal medyada 'Trol' olarak adlandırılan hesapların temel amacı nedir?", "Tartışma çıkarmak, insanları kışkırtmak ve bilgi kirliliği yaymak."],
            ["E-ticarette geri iade süreçlerinin şeffaf olması neyi güçlendirir?", "Müşteri güvenini."],
            ["Veri görselleştirmede renk kullanımının temel amacı ne olmalıdır?", "Bilgiyi daha anlaşılır kılmak ve önemli verileri gruplandırmak."],
            ["E-ticaret sitelerinde 'Canlı Destek' (Chatbot) kullanımının faydası nedir?", "Müşteri sorularına anlık cevap vererek satış ihtimalini artırmak."],
            ["Dijital ayak izi nedir?", "İnternet ortamında yapılan her türlü işlem sonrası bırakılan izlerdir."],
            ["Bir e-ticaret sitesinde 'Hakkımızda' sayfası neden önemlidir?", "Markanın güvenilirliğini ve şeffaflığını göstermek için."],
            ["Mobil uyumlu (Responsive) tasarım nedir?", "Web sitesinin tüm cihaz ekranlarına (telefon, tablet, bilgisayar) otomatik uyum sağlamasıdır."],
            ["İnternet üzerinden yapılan alışverişlerde 'Mesafeli Satış Sözleşmesi' ne zaman onaylanır?", "Ödeme aşamasından hemen önce."],
            ["Veri okuryazarlığı nedir?", "Veriyi okuma, anlama, analiz etme ve etik bir şekilde kullanma becerisidir."],
            ["Sosyal medyada siber zorbalıkla karşılaşıldığında yapılması gereken ilk şey nedir?", "Zorbalık yapan hesabı engellemek ve platforma bildirmek."],
            ["E-ticarette 'Omnichannel' pazarlama stratejisi nedir?", "Fiziksel ve dijital tüm kanalların entegre bir şekilde kullanılmasıdır."],
            ["Bir veri tablosundaki satır ve sütunların kesiştiği her bir kutucuğa ne ad verilir?", "Hücre."],
            ["Büyük Veri (Big Data) kavramı neyi ifade eder?", "Geleneksel yöntemlerle işlenemeyecek kadar büyük, karmaşık ve hızlı büyüyen verileri."],
            ["E-ticarette 'Affiliate Marketing' (Satış Ortaklığı) nedir?", "Başkalarının ürünlerini tanıtarak yapılan her satıştan komisyon alma modelidir."],
            ["Görsel tasarımdaki 'Denge' prensibi neyi ifade eder?", "Ögelerin görsel ağırlığının tasarımın geneline eşit şekilde dağıtılmasıdır."],
            ["Phishing (Oltalama) saldırılarından korunmanın en etkili yolu nedir?", "Şüpheli linklere tıklamamak ve kurumsal olmayan adreslerden gelen e-postalara güvenmemek."],
            ["E-ticaret sitelerinde 'Sıkça Sorulan Sorular' (SSS) bölümünün amacı nedir?", "Müşterilerin ortak sorunlarına hızlı çözümler sunarak destek yükünü azaltmak."],
            ["Arama motorlarında reklam vererek en üst sırada çıkmaya ne ad verilir?", "SEM (Search Engine Marketing - Arama Motoru Pazarlaması)."],
            ["Dijital pazarlamada 'Retargeting' (Yeniden Hedefleme) nedir?", "Sitenizi ziyaret eden ancak alışveriş yapmayan kullanıcılara reklamlarınızın tekrar gösterilmesidir."],
            ["Veri görselleştirmede kullanılan 'Isı Haritası' (Heat Map) neyi gösterir?", "Verilerin yoğunluğunu veya web sitesindeki tıklanma bölgelerini renklerle gösterir."],
            ["Sosyal medya bağımlılığını azaltmak için önerilen 'Dijital Detoks' nedir?", "Belirli bir süre teknolojik cihazlardan ve sosyal medyadan uzak durmaktır."],
            ["E-ticarette 'C2C' modeline bir örnek veriniz?", "Sahibinden veya Gardrops gibi bireylerin birbirine satış yaptığı platformlar."],
            ["Bir e-ticaret sitesinin yüklenme hızının yavaş olması neye sebep olur?", "Müşterilerin siteyi terk etmesine ve satış kaybına."],
            ["İnternet etiği (Netiket) nedir?", "İnternet ortamında uyulması gereken nezaket ve saygı kurallarıdır."],
            ["Bulut Bilişim (Cloud Computing) avantajı nedir?", "Verilere her yerden, her cihazla erişim imkânı ve düşük maliyetli depolama sağlar."],
            ["Sosyal medyada paylaşılan bilginin doğruluğunu kontrol etmeye ne ad verilir?", "Teyit etme (Fact-checking)."],
            ["Veri görselleştirmede 'Yığılmış Sütun Grafiği' ne zaman kullanılır?", "Kategoriler içindeki alt kırılımları ve toplam değerleri bir arada göstermek için."],
            ["E-ticarette 'Dönüşüm Oranı' (Conversion Rate) nedir?", "Siteyi ziyaret edenlerin kaçının satın alma işlemini gerçekleştirdiğini gösteren orandır."],
            ["Kişisel verilerin ihlali durumunda şikayet edilebilecek kurum hangisidir?", "KVKK Kurumu (Kişisel Verileri Koruma Kurumu)."],
            ["İnternet tarayıcılarının geçmişi ve tercihleri hatırlamak için kullandığı küçük dosyalara ne ad verilir?", "Çerez (Cookie)."],
            ["E-ticarette 'Pazar Yeri' (Marketplace) modeli nedir?", "Farklı satıcıların ürünlerini tek bir platform üzerinden satabildiği sistemdir (Örn: Trendyol)."],
            ["Dijital okuryazarlık nedir?", "Dijital teknolojileri güvenli, eleştirel ve etkili bir şekilde kullanabilme yeteneğidir."],
            ["Sanal kart kullanmanın e-ticaretteki en büyük faydası nedir?", "Asıl kredi kartı limitinden bağımsız, sadece alışveriş tutarı kadar limit belirlenerek güvenliğin artırılmasıdır."],
            ["Veri madenciliği nedir?", "Büyük veri yığınları arasından değerli bilgileri keşfetme ve anlam çıkarma sürecidir."],
            ["Sosyal medyada yayılan asılsız haberlere ne ad verilir?", "Dezenformasyon veya Fake News."],
            ["E-ticarette 'Kullanıcı Yorumları' neden kritiktir?", "Potansiyel alıcılar için sosyal kanıt oluşturur ve satın alma güvenini artırır."],
            ["Web 2.0 kavramı neyi temsil eder?", "Kullanıcıların içerik üretebildiği ve etkileşime girebildiği sosyal internet dönemini."],
            ["Veri görselleştirmede 'Kabarcık Grafiği' (Bubble Chart) kaç boyutu gösterebilir?", "Üç boyutu (X ekseni, Y ekseni ve kabarcık boyutu)."],
            ["Siber zorbalığın hukuki cezası var mıdır?", "Evet, Türk Ceza Kanunu kapsamında hakaret ve tehdit suçlarından cezası vardır."],
            ["E-ticarette 'E-Fatura' sisteminin avantajı nedir?", "Kâğıt israfını önler, arşivlemeyi kolaylaştırır ve maliyetleri düşürür."],
            ["Veri setindeki değişkenlerin dağılımını gösteren grafik türü hangisidir?", "Histogram."],
            ["Sosyal medya algoritması nedir?", "Kullanıcıya ilgi duyabileceği içerikleri öncelikli gösteren matematiksel kurallar bütünüdür."],
            ["İnternet üzerinden yapılan dolandırıcılık faaliyetlerine karşı alınacak en temel önlem nedir?", "Bilinçli kullanıcı olmak ve güvenlik yazılımları kullanmak."],
            ["E-ticaret sitelerinde 'Ücretsiz Kargo' seçeneği satışları nasıl etkiler?", "Genellikle satış hacmini ve sepet tutarını artırıcı bir etkisi vardır."],
            ["Bir veri setinde en sık tekrar eden değere ne ad verilir?", "Mod."],
            ["Sosyal medyada gizlilik ayarlarının düzenli kontrol edilmesi neden önemlidir?", "Paylaşılan bilgilerin sadece istenilen kişiler tarafından görülmesini sağlamak için."],
            ["E-ticaretin temeli nedir?", "Kişilik haklarına saldırı ve bilişim suçları kapsamındaki yasalar."]
        ];

        let data = [...dataOrig];
        let current = 0;
        let isSpeech = false;

        function update() {
            document.getElementById('card').classList.remove('is-flipped');
            document.getElementById('qText').innerText = data[current][0];
            document.getElementById('aText').innerText = data[current][1];
            document.getElementById('counter').innerText = `${current + 1} / ${data.length}`;
            document.getElementById('progressBar').style.width = `${((current + 1) / data.length) * 100}%`;
            if(isSpeech) speak(data[current][0]);
        }

        function nextCard() { if(current < data.length-1) { current++; update(); } }
        function prevCard() { if(current > 0) { current--; update(); } }
        function shuffleCards() { data.sort(() => Math.random() - 0.5); current = 0; update(); }

        function toggleSpeech() {
            isSpeech = !isSpeech;
            const btn = document.getElementById('speakBtn');
            btn.innerText = isSpeech ? "🔊 Ses: Açık" : "🔇 Ses: Kapalı";
            btn.className = isSpeech ? "btn-speak-on" : "btn-speak-off";
            if(isSpeech) speak(data[current][0]); else window.speechSynthesis.cancel();
        }

        function speak(t) {
            if(!isSpeech) return;
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t); m.lang = 'tr-TR';
            window.speechSynthesis.speak(m);
        }

        document.getElementById('card').onclick = function() {
            this.classList.toggle('is-flipped');
            if(isSpeech && this.classList.contains('is-flipped')) speak(data[current][1]);
        };
        update();
    </script>
</body>
</html>
